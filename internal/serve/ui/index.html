<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>vibelog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sync.css">
</head>
<body>
<div class="app">
  <header class="header fade-in">
    <div class="brand">VIBELOG</div>
    <div class="proj-switcher" id="projSwitcher" hidden></div>
    <div class="crumbs"><span class="repo">vibelog</span><span class="sep">/</span><span class="branch" id="branch">main</span></div>
    <div class="sync-state">
      <span id="status">connecting…</span>
    </div>
  </header>
  <div class="body">
    <aside class="rail fade-in d1">
      <div class="rail-section">
        <div class="rail-title" id="railTitle">PROMPTS</div>
        <div id="timeline" class="vtl"></div>
      </div>
    </aside>
    <main class="main fade-in d2">
      <div id="app" class="main-inner"></div>
    </main>
  </div>
</div>
<script src="sync.js"></script>
</body>
</html>
